<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منشئ السيرة الذاتية | salamm.online</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif; }
    body { background: #f4f8fe; min-height: 100vh; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .tool-page { background: white; border-radius: 40px; padding: 2.5rem; box-shadow: 0 8px 30px rgba(0,20,30,0.06); }
    .tool-page h2 { font-size: 2rem; color: #0b2a3e; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 12px; }
    .tool-page h2 i { color: #1f6390; }
    .tool-page .desc { color: #2c5779; font-size: 1.1rem; margin-bottom: 2rem; border-right: 4px solid #1f6390; padding-right: 1rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-weight: 600; color: #0b2a3e; margin-bottom: 0.3rem; font-size: 0.9rem; }
    .form-group input, .form-group textarea { width: 100%; padding: 0.7rem 1rem; border: 2px solid #dce6ef; border-radius: 12px; font-size: 0.95rem; transition: 0.2s; }
    .form-group input:focus, .form-group textarea:focus { border-color: #1f6390; outline: none; }
    .form-group textarea { min-height: 60px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .photo-upload { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .photo-preview { width: 80px; height: 80px; border-radius: 50%; background: #dce6ef; display: flex; align-items: center; justify-content: center; color: #6f8ca0; overflow: hidden; border: 3px solid #eaf1f7; flex-shrink: 0; }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
    .btn { background: #1a4b6d; color: white; padding: 0.8rem 2.5rem; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; font-size: 1rem; transition: 0.2s; }
    .btn:hover { background: #0f3a57; }
    .btn-success { background: #27ae60; }
    .btn-success:hover { background: #219a52; }
    .btn-secondary { background: #e8f0f7; color: #0b2a3e; }
    .btn-secondary:hover { background: #d5e2ed; }
    .btn-warning { background: #e67e22; color: white; }
    .btn-warning:hover { background: #d35400; }
    .full-width { grid-column: 1 / -1; }
    .actions { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1.5rem; }
    #cv-preview {
      background: #ffffff;
      border: 1px solid #dce6ef;
      border-radius: 16px;
      margin-top: 1.5rem;
      overflow: hidden;
      direction: rtl;
      text-align: right;
      width: 100%;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    #cv-preview * { direction: rtl !important; text-align: right !important; font-family: 'Segoe UI', 'Tahoma', Arial, sans-serif !important; unicode-bidi: embed !important; }
    .cv-header {
      background: #1a3b52;
      color: white;
      padding: 28px 30px 22px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .cv-photo-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid #e8c99a;
      flex-shrink: 0;
      background: #2a7faa;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: rgba(255,255,255,0.4);
      overflow: hidden;
    }
    .cv-photo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cv-header-info { flex: 1; min-width: 180px; }
    .cv-header-info .cv-name { font-size: 1.6rem; font-weight: 700; color: white; margin-bottom: 2px; }
    .cv-header-info .cv-title { font-size: 0.95rem; color: #e8c99a; font-weight: 500; margin-bottom: 6px; }
    .cv-header-info .cv-contact { display: flex; flex-wrap: wrap; gap: 8px 18px; font-size: 0.8rem; color: rgba(255,255,255,0.8); }
    .cv-header-info .cv-contact span { display: flex; align-items: center; gap: 4px; }
    .cv-body { padding: 20px 28px; }
    .cv-section { margin-bottom: 16px; }
    .cv-section:last-child { margin-bottom: 0; }
    .cv-section-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1a3b52;
      border-bottom: 3px solid #e8c99a;
      padding-bottom: 4px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cv-section-title i { color: #2a7faa; font-size: 0.9rem; }
    .cv-section-body { font-size: 0.85rem; color: #1c2b22; line-height: 1.8; white-space: pre-line; padding-right: 4px; }
    .cv-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .cv-tag { background: #eaf1f7; color: #1a3b52; padding: 2px 14px; border-radius: 14px; font-size: 0.75rem; font-weight: 600; }
    .cv-tag.gold { background: #e8c99a; color: #1a3b52; }
    .cv-tag.green { background: #27ae60; color: white; }
    .cv-footer {
      border-top: 1px solid #eaf1f7;
      padding: 10px 28px;
      font-size: 0.65rem;
      color: #8a9aa8;
      text-align: center;
      direction: rtl;
    }
    @media (max-width: 820px) { .tool-page { padding: 1.5rem; } .form-row { grid-template-columns: 1fr; } .cv-header { flex-direction: column; text-align: center; padding: 20px; } .cv-header-info .cv-contact { justify-content: center; } .cv-body { padding: 16px; } }
    @media (max-width: 480px) { .cv-photo-circle { width: 70px; height: 70px; font-size: 1.8rem; } .cv-header-info .cv-name { font-size: 1.2rem; } }
  </style>
</head>
<body>
<div class="container">
  <section class="tool-page">
    <h2><i class="fas fa-id-card"></i> منشئ السيرة الذاتية</h2>
    <div class="desc">أنشئ سيرة ذاتية احترافية مع صورة شخصية، جاهزة للتحميل بصيغة PDF.</div>

    <form id="cvForm" class="cv-form">
      <div class="form-group full-width photo-upload">
        <label>الصورة الشخصية</label>
        <div class="photo-preview" id="photoPreview"><i class="fas fa-user fa-2x"></i></div>
        <input type="file" id="photoInput" accept="image/*" style="display:none;" />
        <button type="button" class="btn btn-secondary" onclick="document.getElementById('photoInput').click()"><i class="fas fa-upload"></i> تحميل صورة</button>
        <button type="button" class="btn btn-secondary" id="removePhotoBtn"><i class="fas fa-times"></i> إزالة</button>
      </div>

      <div class="form-group">
        <label><i class="fas fa-user"></i> الاسم الكامل *</label>
        <input type="text" id="fullName" placeholder="الاسم الكامل" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-briefcase"></i> اللقب / التخصص</label>
        <input type="text" id="title" placeholder="طالب / مهندس / باحث" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-calendar-alt"></i> تاريخ الميلاد</label>
        <input type="text" id="birthdate" placeholder="يوم / شهر / سنة" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-phone"></i> رقم الهاتف</label>
        <input type="text" id="phone" placeholder="+212 6X XX XX XX" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="email@example.com" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-map-marker-alt"></i> العنوان</label>
        <input type="text" id="address" placeholder="المدينة، الدولة" />
      </div>

      <div class="form-group full-width">
        <label><i class="fas fa-graduation-cap"></i> التعليم (سطر واحد لكل شهادة)</label>
        <textarea id="education" rows="3" style="min-height:80px;"></textarea>
      </div>

      <div class="form-group full-width">
        <label><i class="fas fa-briefcase"></i> الخبرات والتجارب</label>
        <textarea id="experience" rows="3" style="min-height:80px;"></textarea>
      </div>

      <div class="form-group full-width">
        <label><i class="fas fa-certificate"></i> الشهادات والدورات</label>
        <textarea id="certificates" rows="3" style="min-height:80px;"></textarea>
      </div>

      <div class="form-group full-width">
        <label><i class="fas fa-language"></i> اللغات (مفصولة بفواصل)</label>
        <input type="text" id="languages" placeholder="العربية, الفرنسية, الإنجليزية" />
      </div>

      <div class="form-group full-width">
        <label><i class="fas fa-laptop"></i> المهارات التقنية (مفصولة بفواصل)</label>
        <input type="text" id="skills" placeholder="Python, JavaScript, HTML, CSS" />
      </div>

      <div class="form-group full-width">
        <label><i class="fas fa-plus-circle"></i> معلومات إضافية</label>
        <textarea id="additional" rows="2" style="min-height:50px;"></textarea>
      </div>
    </form>

    <div class="actions">
      <button class="btn btn-success" id="generateBtn"><i class="fas fa-file-alt"></i> إنشاء السيرة الذاتية</button>
      <button class="btn" id="downloadPdfBtn" style="display:none;"><i class="fas fa-download"></i> تحميل PDF</button>
      <button class="btn btn-secondary" id="resetBtn"><i class="fas fa-redo"></i> إعادة تعيين</button>
      <button class="btn btn-warning" id="loadExample1"><i class="fas fa-user-graduate"></i> مثال 1 (طالب)</button>
      <button class="btn btn-warning" id="loadExample2"><i class="fas fa-user-tie"></i> مثال 2 (مهندس)</button>
    </div>

    <div id="cv-preview" style="display:none;"></div>
  </section>
</div>

<script>
  let photoData = null;

  document.getElementById('photoInput').addEventListener('change', function(e) {
    if(this.files[0]) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        photoData = ev.target.result;
        document.getElementById('photoPreview').innerHTML = `<img src="${photoData}" />`;
      };
      reader.readAsDataURL(this.files[0]);
    }
  });

  document.getElementById('removePhotoBtn').addEventListener('click', () => {
    photoData = null;
    document.getElementById('photoPreview').innerHTML = '<i class="fas fa-user fa-2x"></i>';
    document.getElementById('photoInput').value = '';
  });

  function generateCV() {
    const name = document.getElementById('fullName').value || 'الاسم الكامل';
    const title = document.getElementById('title').value || 'اللقب';
    const birthdate = document.getElementById('birthdate').value || 'تاريخ الميلاد';
    const phone = document.getElementById('phone').value || 'رقم الهاتف';
    const email = document.getElementById('email').value || 'البريد الإلكتروني';
    const address = document.getElementById('address').value || 'العنوان';
    const education = document.getElementById('education').value || 'التعليم';
    const experience = document.getElementById('experience').value || '';
    const certificates = document.getElementById('certificates').value || 'الشهادات';
    const languages = document.getElementById('languages').value || 'اللغات';
    const skills = document.getElementById('skills').value || 'المهارات';
    const additional = document.getElementById('additional').value || '';

    let html = `
      <div class="cv-header">
        <div class="cv-photo-circle">${photoData ? `<img src="${photoData}" alt="صورة">` : '👤'}</div>
        <div class="cv-header-info">
          <div class="cv-name">${name}</div>
          <div class="cv-title">${title}</div>
          <div class="cv-contact">
            <span><i class="fas fa-calendar-alt"></i> ${birthdate}</span>
            <span><i class="fas fa-phone"></i> ${phone}</span>
            <span><i class="fas fa-envelope"></i> ${email}</span>
            <span><i class="fas fa-map-marker-alt"></i> ${address}</span>
          </div>
        </div>
      </div>
      <div class="cv-body">
    `;

    if(education) html += `<div class="cv-section"><div class="cv-section-title"><i class="fas fa-graduation-cap"></i> التعليم</div><div class="cv-section-body">${education.replace(/\n/g, '\n')}</div></div>`;
    if(experience) html += `<div class="cv-section"><div class="cv-section-title"><i class="fas fa-briefcase"></i> الخبرات</div><div class="cv-section-body">${experience.replace(/\n/g, '\n')}</div></div>`;
    if(certificates) html += `<div class="cv-section"><div class="cv-section-title"><i class="fas fa-certificate"></i> الشهادات والدورات</div><div class="cv-section-body">${certificates.replace(/\n/g, '\n')}</div></div>`;
    
    if(languages) {
      const langList = languages.split(',').map(l => l.trim()).filter(l => l);
      html += `<div class="cv-section"><div class="cv-section-title"><i class="fas fa-language"></i> اللغات</div><div class="cv-section-body"><div class="cv-tags">${langList.map(l => `<span class="cv-tag gold">${l}</span>`).join('')}</div></div></div>`;
    }

    if(skills) {
      const skillList = skills.split(',').map(s => s.trim()).filter(s => s);
      html += `<div class="cv-section"><div class="cv-section-title"><i class="fas fa-laptop"></i> المهارات التقنية</div><div class="cv-section-body"><div class="cv-tags">${skillList.map(s => `<span class="cv-tag green">${s}</span>`).join('')}</div></div></div>`;
    }

    if(additional) html += `<div class="cv-section"><div class="cv-section-title"><i class="fas fa-plus-circle"></i> معلومات إضافية</div><div class="cv-section-body">${additional.replace(/\n/g, '\n')}</div></div>`;

    html += `</div><div class="cv-footer">السيرة الذاتية من إعداد salamm.online</div>`;

    const preview = document.getElementById('cv-preview');
    preview.innerHTML = html;
    preview.style.display = 'block';
    document.getElementById('downloadPdfBtn').style.display = 'inline-block';
  }

  const examples = {
    example1: {
      name: 'أحمد محمد العلوي', title: 'طالب ماجستير في الذكاء الاصطناعي',
      birthdate: '15 / 03 / 2000', phone: '+212 6 12 34 56 78',
      email: 'ahmed.aloui@email.com', address: 'الدار البيضاء، المغرب',
      education: '2022-2024 ماجستير في الذكاء الاصطناعي – جامعة الحسن الثاني\n2018-2022 ليسانس في علوم الحاسوب – جامعة محمد الخامس',
      experience: '2023-2024 متدرب – شركة DataMind (تطوير نماذج تعلم الآلة)\n2022-2023 مساعد تدريس – جامعة الحسن الثاني (برمجة Python)',
      certificates: 'شهادة Google Professional ML Engineer\nشهادة IELTS (7.5)',
      languages: 'العربية, الفرنسية, الإنجليزية, الإسبانية',
      skills: 'Python, TensorFlow, PyTorch, Scikit-learn, SQL, Docker, Git',
      additional: 'عضو في نادي الذكاء الاصطناعي بجامعة الحسن الثاني'
    },
    example2: {
      name: 'سارة بنت عبد الله', title: 'مهندسة برمجيات – Full Stack Developer',
      birthdate: '22 / 07 / 1998', phone: '+212 6 98 76 54 32',
      email: 'sara.bent@email.com', address: 'الرباط، المغرب',
      education: '2016-2020 مهندس برمجيات – المعهد الوطني للبريد والمواصلات\n2020-2022 ماستر في هندسة الويب – جامعة محمد الخامس',
      experience: '2022-2024 مطورة Full Stack – شركة WebSolutions (React, Node.js, MongoDB)\n2021-2022 مطورة Frontend – شركة Digitaleo (Angular, TypeScript)',
      certificates: 'شهادة AWS Certified Developer – Associate\nشهادة TOEFL (95/120)',
      languages: 'العربية, الفرنسية, الإنجليزية',
      skills: 'JavaScript, TypeScript, React, Angular, Node.js, MongoDB, PostgreSQL, Docker, AWS, Git',
      additional: 'مؤسسة مبادرة "Women in Tech Morocco"\nمدونة تقنية عن تطوير الويب'
    }
  };

  function loadExample(example) {
    const data = examples[example];
    if(!data) return;
    Object.keys(data).forEach(key => {
      const el = document.getElementById(key === 'name' ? 'fullName' : key === 'title' ? 'title' : key === 'birthdate' ? 'birthdate' : key === 'phone' ? 'phone' : key === 'email' ? 'email' : key === 'address' ? 'address' : key === 'education' ? 'education' : key === 'experience' ? 'experience' : key === 'certificates' ? 'certificates' : key === 'languages' ? 'languages' : key === 'skills' ? 'skills' : key === 'additional' ? 'additional' : null);
      if(el) el.value = data[key];
    });
    photoData = null;
    document.getElementById('photoPreview').innerHTML = '<i class="fas fa-user fa-2x"></i>';
    document.getElementById('photoInput').value = '';
    generateCV();
  }

  document.getElementById('generateBtn').addEventListener('click', generateCV);
  document.getElementById('resetBtn').addEventListener('click', () => {
    document.querySelectorAll('#cvForm input, #cvForm textarea').forEach(el => el.value = '');
    document.getElementById('cv-preview').style.display = 'none';
    document.getElementById('cv-preview').innerHTML = '';
    document.getElementById('downloadPdfBtn').style.display = 'none';
    photoData = null;
    document.getElementById('photoPreview').innerHTML = '<i class="fas fa-user fa-2x"></i>';
    document.getElementById('photoInput').value = '';
  });
  document.getElementById('loadExample1').addEventListener('click', () => loadExample('example1'));
  document.getElementById('loadExample2').addEventListener('click', () => loadExample('example2'));

  document.getElementById('downloadPdfBtn').addEventListener('click', async function() {
    const preview = document.getElementById('cv-preview');
    if(!preview || preview.style.display === 'none') { alert('الرجاء إنشاء السيرة الذاتية أولاً'); return; }
    const btn = this;
    btn.disabled = true;
    btn.textContent = '⏳ جاري التحميل...';
    try {
      const canvas = await html2canvas(preview, { scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false });
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: canvas.width > canvas.height ? 'landscape' : 'portrait', unit: 'px', format: [canvas.width / 2, canvas.height / 2] });
      pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, canvas.width / 2, canvas.height / 2);
      const name = document.getElementById('fullName').value || 'CV';
      pdf.save(`السيرة_الذاتية_${name}_سلام_سبيس.pdf`);
    } catch(err) { alert('خطأ: ' + err.message); }
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-download"></i> تحميل PDF';
  });

  const script1 = document.createElement('script');
  script1.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  document.head.appendChild(script1);
  const script2 = document.createElement('script');
  script2.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  document.head.appendChild(script2);

  window.addEventListener('load', function() {
    setTimeout(() => loadExample('example1'), 300);
  });
</script>
</body>
</html>
